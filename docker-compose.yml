services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB:       ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ledger:ledger@postgres:5432/ledger
      SQL_ECHO:     "false"
      ENV:          development
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80","http://frontend"]'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
