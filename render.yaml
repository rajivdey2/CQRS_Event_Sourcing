services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: cqrs-ledger-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cqrs-ledger-db
          property: connectionString
      - key: SQL_ECHO
        value: "false"
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        value: '["https://cqrs-ledger.vercel.app"]'   # update after Vercel deploy

databases:
  # ── Managed Postgres ─────────────────────────────────────────────────────────
  - name: cqrs-ledger-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
